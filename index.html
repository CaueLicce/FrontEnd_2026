<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio de Tarefas</title>

  <style>
    /* ── BASE ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #f0f4f8;
      color: #2d3748;
      font-family: Georgia, serif;
      font-size: 16px;
      line-height: 1.8;
    }

    /* ── HEADER ── */
    header {
      background-color: #1a365d;
      color: #ffffff;
      padding: 3rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      color: #90cdf4;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #bee3f8;
      font-size: 0.95rem;
    }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    h2 {
      font-size: 1.2rem;
      color: #1a365d;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    /* ── GRID DE CARDS ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
    }

    /* ── CARD ── */
    .card {
      background-color: #ffffff;
      border-radius: 10px;
      border-left: 5px solid #2b6cb0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }

    .card .numero {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: #2b6cb0;
      margin-bottom: 0.4rem;
    }

    .card h3 {
      font-size: 1rem;
      color: #1a365d;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.88rem;
      color: #718096;
      line-height: 1.5;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #a0aec0;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>

<body>

  <header>
    <h1>Portfólio de Tarefas</h1>
    <p>Programação Front-End 2026 &mdash; UniCesumar</p>
  </header>

  <main>
    <h2>Tarefas publicadas</h2>

    <div class="grid">

      <!-- CARD DE TAREFA — duplique este bloco para adicionar novas tarefas -->
      <a class="card" href="tarefa1/">
        <div class="numero">// tarefa 01</div>
        <h3>Meus Colecionáveis</h3>
        <p>Colecionáveis.</p>
      </a>
      <a class="card" href="tarefa2/">
        <div class="numero">// tarefa 02</div>
        <h3>Métodos de Ordenação em C</h3>
        <p>Bubble, Selection, Insertion, Quick e Merge Sort.</p>
      </a>


      <!-- Adicione mais cards aqui -->

    </div>
  </main>

  <footer>
    <p>Seu Nome &mdash; seuusuario.github.io</p>
  </footer>

</body>
</html>
