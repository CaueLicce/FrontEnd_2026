<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bichinho Pneu</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 1.5s ease;
      min-height: 100vh;
    }

    #tela-jogo {
      position: relative;
      width: 420px;
      height: 520px;
      margin: 0 auto;
    }

    #sombra {
      position: absolute;
      bottom: 108px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 18px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.35), transparent 70%);
    }

    #criatura-wrap {
      position: absolute;
      bottom: 118px; left: 50%;
      transform: translateX(-50%);
      width: 185px; height: 185px;
    }

    #criatura-wrap.morta { bottom: 100px; }

    #b {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      transition: filter 0.3s;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
    }

    #criatura-wrap.drag-over #b {
      filter: drop-shadow(0 0 20px rgba(255,210,50,1));
    }

    @keyframes pulsar {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    @keyframes tremer {
      0%,100% { transform: translateX(0) rotate(0deg); }
      20%     { transform: translateX(-5px) rotate(-3deg); }
      40%     { transform: translateX(5px) rotate(3deg); }
      60%     { transform: translateX(-3px) rotate(-1deg); }
      80%     { transform: translateX(3px) rotate(1deg); }
    }
    @keyframes comer {
      0%,100% { transform: scale(1); }
      30%     { transform: scale(1.08) rotate(-2deg); }
      60%     { transform: scale(0.95) rotate(2deg); }
    }
    @keyframes feliz {
      0%,100% { transform: scale(1) rotate(0deg); }
      20%     { transform: scale(1.1) rotate(-3deg); }
      40%     { transform: scale(1.12) rotate(3deg); }
      60%     { transform: scale(1.08) rotate(-2deg); }
      80%     { transform: scale(1.05) rotate(2deg); }
    }

    #b.pulsando     { animation: pulsar 2.5s ease-in-out infinite; }
    #b.tremendo     { animation: tremer 0.5s ease-in-out infinite; }
    #b.comendo-anim { animation: comer 0.4s ease-in-out 3; }
    #b.feliz-anim   { animation: feliz 0.6s ease-in-out 3; }

    #bandeja {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 20px;
      z-index: 20;
    }

    .comida-slot {
      width: 72px; height: 72px;
      cursor: grab;
      user-select: none;
      transition: transform 0.15s, filter 0.15s;
    }

    .comida-slot img {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .comida-slot:hover {
      transform: scale(1.15);
      filter: drop-shadow(0 0 8px rgba(255,180,50,0.8));
    }

    .comida-slot:active { cursor: grabbing; }
    .comida-slot.invisivel { visibility: hidden; }

    #drag-clone {
      position: fixed;
      width: 76px; height: 76px;
      pointer-events: none;
      z-index: 9999;
      display: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 4px 14px rgba(255,180,0,0.9));
    }

    #drag-clone img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    #btn-reiniciar {
      display: none;
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    .particula {
      position: absolute;
      pointer-events: none;
      font-size: 20px;
      z-index: 30;
      animation: subir 1s ease-out forwards;
    }

    @keyframes subir {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.3) rotate(30deg); }
    }

    #btn-secreto {
      position: fixed;
      bottom: 8px; right: 8px;
      width: 12px; height: 12px;
      opacity: 0.01;
      cursor: default;
      z-index: 9998;
      border: none;
      background: transparent;
    }

    #modal-gostosinho {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 99999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    #modal-gostosinho.ativo { display: flex; }

    #modal-gostosinho img {
      max-width: 280px;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(255,100,100,0.4);
      animation: entrar 0.4s ease-out;
    }

    @keyframes entrar {
      from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    #modal-gostosinho p {
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      text-align: center;
    }

    #overlay-morte {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      z-index: 8;
      border-radius: 16px;
      transition: background 1.5s;
    }

    #overlay-morte.ativo { background: rgba(0,0,0,0.45); }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<div id="drag-clone"><img src="comida.png" alt=""></div>

<div id="modal-gostosinho" onclick="this.classList.remove('ativo')">
  <img src="gostosinho.jpeg" alt="Gostosinho">
  <p>😏 SOLTEIRA?</p>
  <p style="font-size:0.75rem;opacity:0.6">clique para fechar</p>
</div>

<div class="navbar bg-base-100 bg-opacity-80 backdrop-blur shadow-sm px-4 gap-4">
  <a class="btn btn-ghost btn-sm text-base-content opacity-60" href="../">← hub</a>

  <div class="avatar">
    <div class="w-10 rounded-full ring ring-primary ring-offset-base-100 ring-offset-1">
      <img id="avatar-img" src="criatura.png" alt="avatar">
    </div>
  </div>

  <input id="nome-criatura" type="text" placeholder="Nome da criatura..."
    class="input input-sm input-bordered flex-1 max-w-xs"/>

  <label class="flex items-center gap-2 text-sm opacity-70 cursor-pointer select-none">
    <span>🌅</span>
    <input id="toggle-noite" type="checkbox" class="toggle toggle-sm toggle-primary" onchange="alternarFundo()"/>
    <span>🌙</span>
  </label>
</div>

<div class="flex-1 flex flex-col items-center justify-center py-4">

  <div class="w-full max-w-sm mb-3 px-4">
    <div class="flex justify-between text-xs mb-1 font-mono opacity-70">
      <span>⚡ fome</span>
      <span id="status-txt">NORMAL</span>
    </div>
    <progress id="barra-fome" class="progress progress-warning w-full" value="100" max="100"></progress>
  </div>

  <div id="tela-jogo">
    <div id="overlay-morte"></div>
    <div id="sombra"></div>

    <div id="criatura-wrap">
      <img id="b" src="criatura.png" alt="bichinho">
    </div>

    <div id="bandeja">
      <div class="comida-slot" id="slot-comida">
        <img src="comida.png" alt="comida" onclick="alimentar()">
      </div>
    </div>

    <div id="btn-reiniciar">
      <button class="btn btn-error btn-sm" onclick="iniciar()">🔄 Reiniciar</button>
    </div>
  </div>

</div>

<button id="btn-secreto" onclick="document.getElementById('modal-gostosinho').classList.add('ativo')"></button>

<script src="script.js"></script>
</body>
</html>
