<!DOCTYPE html>
<html lang="pt-br" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Criatura Virtual</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .btn-hub-apoo {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #8892b0;
    text-decoration: none;
    border: 1px solid #2a2f45;
    border-radius: 6px;
    padding: 5px 12px;
    margin-bottom: 1.2rem;
    transition: color 0.2s, border-color 0.2s;
  }
 
  .btn-hub-apoo:hover {
    color: #5e9bff;
    border-color: #5e9bff;
  }
        
        body {
            transition: background-image 1s ease-in-out;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .criatura-container {
            transition: transform 0.3s ease;
        }
        .pulsar { animation: pulsar 2s ease-in-out infinite; }
        .tremer { animation: tremer 0.5s ease-in-out infinite; }
        .comer { animation: comer 0.5s ease-in-out; }
        
        @keyframes pulsar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes tremer {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 0); }
            75% { transform: translate(5px, 0); }
        }
        @keyframes comer {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        #easter-egg {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0;
            cursor: pointer;
            width: 30px;
            height: 30px;
            z-index: 100;
        }
        #easter-egg:hover { opacity: 0.1; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-4 overflow-hidden" style="background-image: url('background.png');">

    <a id="btn-hub" href="../">← hub</a>

    <div class="w-full max-w-2xl flex flex-col gap-4 bg-base-100/80 backdrop-blur-sm p-4 rounded-2xl shadow-xl">
        <div class="flex items-center gap-4">
            <div class="avatar">
                <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                    <img id="avatar-img" src="Criatura/criatura.png" />
                </div>
            </div>
            <div class="flex-1">
                <input type="text" placeholder="Nome da criatura..." class="input input-bordered input-primary w-full max-w-xs" />
                <div id="status-badge" class="badge badge-success mt-2">Feliz</div>
            </div>
            <div class="flex flex-col items-end gap-2">
                <span class="text-xs font-bold uppercase tracking-widest opacity-70">Fome</span>
                <progress id="fome-barra" class="progress progress-primary w-32" value="100" max="100"></progress>
            </div>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center w-full relative">
        <div id="criatura-wrap" class="criatura-container relative">
            <img id="mainImage" src="Criatura/criatura.png" alt="Criatura" class="w-64 h-64 object-contain pulsar" />
        </div>
    </div>

    <div class="w-full max-w-md bg-base-100/80 backdrop-blur-sm p-6 rounded-t-3xl shadow-2xl flex flex-col items-center gap-6">
        <div class="flex justify-center gap-8 w-full">
            <div class="flex flex-col items-center gap-2">
                <button onclick="alimentar()" class="btn btn-circle btn-lg btn-secondary shadow-lg hover:scale-110 active:scale-95 transition-all">
                    <img src="Criatura/comida.png" class="w-8 h-8" alt="Alimentar" />
                </button>
                <span class="text-xs font-bold uppercase">Alimentar</span>
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <label class="swap swap-rotate btn btn-circle btn-lg btn-accent shadow-lg">

                    <input type="checkbox" id="dia-noite-toggle" onchange="alternarManual()" />

                    <svg class="swap-on fill-current w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>

                    <svg class="swap-off fill-current w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.69Z"/></svg>
                </label>
                <span class="text-xs font-bold uppercase">Ciclo</span>
            </div>
        </div>

        <button id="btn-reiniciar" onclick="iniciar()" class="btn btn-error btn-wide hidden shadow-xl">Ressuscitar Criatura</button>
    </div>

    <div id="easter-egg" onclick="mostrarEasterEgg()"></div>

    <dialog id="modal_gostosinho" class="modal">
        <div class="modal-box text-center">
            <h3 class="font-bold text-lg">Easter Egg Encontrado!</h3>
            <p class="py-4">Você achou o Ferlini (vulgo Gostosinho)! +1 ponto extra.</p>
            <img src="gostosinho.jpeg" class="mx-auto rounded-lg shadow-lg max-w-full h-auto" />
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Legal!</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
