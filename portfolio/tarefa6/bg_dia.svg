<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="ceuDia" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff9a3c"/>
      <stop offset="40%" stop-color="#c84b00"/>
      <stop offset="100%" stop-color="#4a1200"/>
    </radialGradient>
    <radialGradient id="sol" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffee88"/>
      <stop offset="60%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="magma1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5500" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#330000" stop-opacity="0"/>
    </radialGradient>
    <filter id="brilho">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- céu -->
  <rect width="1200" height="800" fill="url(#ceuDia)"/>

  <!-- sol -->
  <ellipse cx="600" cy="120" rx="100" ry="100" fill="url(#sol)" filter="url(#brilho)" opacity="0.6"/>
  <ellipse cx="600" cy="120" rx="40" ry="40" fill="#ffee88" opacity="0.9"/>

  <!-- nuvens de fumaça -->
  <ellipse cx="180" cy="200" rx="90" ry="40" fill="#2a1000" opacity="0.35"/>
  <ellipse cx="240" cy="185" rx="70" ry="35" fill="#3a1500" opacity="0.3"/>
  <ellipse cx="900" cy="230" rx="100" ry="45" fill="#2a1000" opacity="0.32"/>
  <ellipse cx="980" cy="210" rx="80" ry="38" fill="#3a1500" opacity="0.28"/>

  <!-- montanhas ao fundo -->
  <polygon points="0,500 150,280 300,500" fill="#1a0800" opacity="0.9"/>
  <polygon points="100,500 280,230 460,500" fill="#221000" opacity="0.85"/>
  <polygon points="700,500 880,250 1060,500" fill="#1a0800" opacity="0.9"/>
  <polygon points="900,500 1080,200 1200,420 1200,500" fill="#221000" opacity="0.85"/>
  <polygon points="350,500 520,310 690,500" fill="#2a1400" opacity="0.8"/>

  <!-- lava nas montanhas -->
  <path d="M150,280 Q160,320 145,370 Q155,340 170,380 Q165,330 180,300 Q165,290 150,280Z" fill="#ff4400" opacity="0.6" filter="url(#brilho)"/>
  <path d="M880,250 Q895,295 880,345 Q892,315 905,360 Q900,310 915,280 Q898,262 880,250Z" fill="#ff5500" opacity="0.55" filter="url(#brilho)"/>

  <!-- chão vulcânico - DEIXA O CENTRO LIVRE -->
  <path d="M0,650 Q100,620 200,640 Q350,660 500,635 Q650,610 800,640 Q950,665 1100,645 Q1150,638 1200,650 L1200,800 L0,800 Z" fill="#1a0800"/>
  <path d="M0,690 Q150,670 300,685 Q500,700 700,678 Q900,658 1100,680 Q1150,685 1200,678 L1200,800 L0,800 Z" fill="#130600"/>

  <!-- fendas de magma no chão -->
  <ellipse cx="150" cy="665" rx="60" ry="12" fill="#ff4400" opacity="0.7" filter="url(#brilho)"/>
  <ellipse cx="155" cy="665" rx="40" ry="7" fill="#ffaa00" opacity="0.5"/>
  <ellipse cx="1050" cy="660" rx="55" ry="11" fill="#ff5500" opacity="0.65" filter="url(#brilho)"/>
  <ellipse cx="1055" cy="660" rx="35" ry="7" fill="#ffbb00" opacity="0.45"/>

  <!-- pedras / decoração lados -->
  <ellipse cx="80" cy="640" rx="55" ry="30" fill="#2a1200" opacity="0.9"/>
  <ellipse cx="1120" cy="635" rx="50" ry="28" fill="#2a1200" opacity="0.9"/>
  <ellipse cx="320" cy="658" rx="40" ry="22" fill="#220e00" opacity="0.8"/>
  <ellipse cx="880" cy="655" rx="45" ry="24" fill="#220e00" opacity="0.8"/>

  <!-- engrenagem decorativa esquerda -->
  <g transform="translate(60,560)" opacity="0.25">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c08030" stroke-width="5"/>
    <circle cx="0" cy="0" r="10" fill="#c08030"/>
    <line x1="0" y1="-30" x2="0" y2="-42" stroke="#c08030" stroke-width="5"/>
    <line x1="0" y1="30" x2="0" y2="42" stroke="#c08030" stroke-width="5"/>
    <line x1="-30" y1="0" x2="-42" y2="0" stroke="#c08030" stroke-width="5"/>
    <line x1="30" y1="0" x2="42" y2="0" stroke="#c08030" stroke-width="5"/>
  </g>

  <!-- engrenagem decorativa direita -->
  <g transform="translate(1140,545) rotate(20)" opacity="0.22">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#c08030" stroke-width="4"/>
    <circle cx="0" cy="0" r="8" fill="#c08030"/>
    <line x1="0" y1="-25" x2="0" y2="-35" stroke="#c08030" stroke-width="4"/>
    <line x1="0" y1="25" x2="0" y2="35" stroke="#c08030" stroke-width="4"/>
    <line x1="-25" y1="0" x2="-35" y2="0" stroke="#c08030" stroke-width="4"/>
    <line x1="25" y1="0" x2="35" y2="0" stroke="#c08030" stroke-width="4"/>
  </g>

  <!-- brilho ambiente do magma embaixo -->
  <ellipse cx="600" cy="800" rx="400" ry="80" fill="#ff4400" opacity="0.15" filter="url(#brilho)"/>
</svg>
