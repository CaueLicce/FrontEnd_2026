<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bichinho Pneu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #080605;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Courier New', monospace;
    }

    /* ── TELA ── */
    #tela {
      position: relative;
      width: 420px; height: 600px;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #2a1a0a;
      box-shadow:
        0 0 40px rgba(255,100,10,0.25),
        0 0 100px rgba(255,50,0,0.10),
        inset 0 0 60px rgba(0,0,0,0.6);
    }

    /* scanlines */
    #tela::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 50;
    }

    /* ── BACKGROUND ── */
    #bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      z-index: 10;
    }

    #hud-row { display: flex; align-items: center; gap: 8px; }

    #hud-label {
      font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: #b07840;
      white-space: nowrap;
    }

    #barra-wrap {
      flex: 1; height: 8px;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      border: 1px solid #3a2010;
      overflow: hidden;
    }

    #barra-fome {
      height: 100%; width: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #ff4500, #ffaa00);
      transition: width 0.5s, background 0.8s;
    }

    #status-txt {
      position: absolute;
      top: 38px; left: 16px;
      font-size: 10px; color: #806040;
      letter-spacing: 0.08em;
    }

    /* ── CRIATURA ── */
    #criatura-wrap {
      position: absolute;
      bottom: 118px; left: 50%;
      transform: translateX(-50%);
      width: 180px; height: 180px;
    }

    #criatura-wrap.morta { bottom: 100px; }

    #b {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      transition: filter 0.3s;
    }

    #sombra {
      position: absolute;
      bottom: 105px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 18px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.5), transparent 70%);
      z-index: 2;
    }

    /* drop highlight */
    #criatura-wrap.drag-over #b {
      filter: drop-shadow(0 0 20px rgba(255,210,50,1));
    }

    /* animações */
    @keyframes pulsar {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    @keyframes tremer {
      0%,100% { transform: translateX(0) rotate(0deg); }
      20%     { transform: translateX(-5px) rotate(-3deg); }
      40%     { transform: translateX(5px)  rotate(3deg); }
      60%     { transform: translateX(-3px) rotate(-1deg); }
      80%     { transform: translateX(3px)  rotate(1deg); }
    }
    @keyframes comer {
      0%,100% { transform: scale(1); }
      30%     { transform: scale(1.08) rotate(-2deg); }
      60%     { transform: scale(0.95) rotate(2deg); }
    }

    #b.pulsando  { animation: pulsar 2.5s ease-in-out infinite; }
    #b.tremendo  { animation: tremer 0.5s ease-in-out infinite; }
    #b.comendo-anim { animation: comer 0.4s ease-in-out 3; }

    /* ── BANDEJA DE COMIDA ── */
    #bandeja {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 20px;
      z-index: 20;
    }

    .comida-slot {
      width: 64px; height: 64px;
      cursor: grab;
      user-select: none;
      transition: transform 0.15s, filter 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .comida-slot img {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .comida-slot:hover {
      transform: scale(1.15);
      filter: drop-shadow(0 0 8px rgba(255,180,50,0.8));
    }

    .comida-slot:active { cursor: grabbing; }
    .comida-slot.invisivel { visibility: hidden; }

    /* clone de arrasto */
    #drag-clone {
      position: fixed;
      width: 72px; height: 72px;
      pointer-events: none;
      z-index: 9999;
      display: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 4px 14px rgba(255,180,0,0.9));
    }

    #drag-clone img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* ── BOTÃO VOLTAR ── */
    #btn-voltar {
      position: absolute;
      top: 14px; right: 16px;
      padding: 5px 12px;
      background: transparent;
      color: #a07040;
      border: 1px solid #3a2010;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      z-index: 20;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    #btn-voltar:hover {
      color: #ffaa50;
      border-color: #ff6a00;
      background: rgba(255,100,0,0.08);
    }

    /* ── BOTÃO REINICIAR ── */
    #btn-reiniciar {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      padding: 11px 32px;
      background: linear-gradient(135deg, #6b1010, #a02020);
      color: #ffd0a0;
      border: 1px solid #ff5030;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px; letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer; display: none; z-index: 20;
      box-shadow: 0 0 24px rgba(200,40,0,0.5);
      transition: transform 0.1s, box-shadow 0.2s;
    }

    #btn-reiniciar:hover {
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 0 36px rgba(255,70,0,0.7);
    }

    /* ── OVERLAY MORTE ── */
    #overlay-morte {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0);
      pointer-events: none;
      z-index: 8;
      transition: background 1.5s;
    }
    #overlay-morte.ativo { background: rgba(0,0,0,0.5); }

    /* ── PARTÍCULAS ── */
    .particula {
      position: absolute;
      pointer-events: none;
      font-size: 20px;
      z-index: 30;
      animation: subir 1s ease-out forwards;
    }

    @keyframes subir {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.3) rotate(30deg); }
    }
  </style>
</head>
<body>

<div id="drag-clone"><img src="" alt=""></div>

<div id="tela">

  <!-- BACKGROUND SVG -->
  <svg id="bg" viewBox="0 0 420 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ceuGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#0d0906"/>
        <stop offset="45%"  stop-color="#1a0f07"/>
        <stop offset="100%" stop-color="#0a0604"/>
      </linearGradient>
      <radialGradient id="magmaGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#ff6a00" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#330000" stop-opacity="0"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glowSoft">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- fundo -->
    <rect width="420" height="600" fill="url(#ceuGrad)"/>

    <!-- teto irregular -->
    <path d="M0,0 L0,85 Q35,55 70,75 Q105,95 140,58 Q170,30 205,68 Q240,95 275,48 Q305,18 340,62 Q370,88 420,60 L420,0 Z" fill="#120a05"/>
    <path d="M0,0 L0,62 Q30,40 62,57 Q95,73 128,36 Q158,12 188,48 Q218,72 252,28 Q282,0 315,40 Q345,70 380,34 Q400,14 420,44 L420,0 Z" fill="#0d0704"/>

    <!-- estalactites -->
    <polygon points="75,0 91,50 107,0"   fill="#1a0d06"/>
    <polygon points="152,0 164,38 176,0" fill="#1a0d06"/>
    <polygon points="228,0 243,58 258,0" fill="#180c05"/>
    <polygon points="308,0 319,44 330,0" fill="#1a0d06"/>
    <polygon points="368,0 380,32 392,0" fill="#190c05"/>
    <!-- veias de magma nos estalactites -->
    <line x1="91"  y1="0" x2="91"  y2="46" stroke="#ff6a00" stroke-width="0.6" opacity="0.35"/>
    <line x1="164" y1="0" x2="164" y2="35" stroke="#ff8800" stroke-width="0.6" opacity="0.28"/>
    <line x1="243" y1="0" x2="243" y2="54" stroke="#ff6a00" stroke-width="0.6" opacity="0.35"/>
    <line x1="319" y1="0" x2="319" y2="40" stroke="#ff7700" stroke-width="0.6" opacity="0.30"/>

    <!-- paredes laterais -->
    <path d="M0,80 Q22,125 5,175 Q-8,228 8,288 Q18,345 2,405 L0,600 L52,600 L52,405 Q62,335 48,275 Q36,215 52,162 Q66,112 48,78 Z" fill="#150b04"/>
    <path d="M420,80 Q398,125 415,175 Q428,228 412,288 Q402,345 418,405 L420,600 L368,600 L368,405 Q358,335 372,275 Q384,215 368,162 Q354,112 372,78 Z" fill="#150b04"/>

    <!-- fendas de magma — parede esquerda -->
    <path d="M0,195 Q16,188 28,206 Q40,224 22,242 Q6,258 0,252" fill="#ff4400" opacity="0.65" filter="url(#glow)"/>
    <path d="M0,195 Q13,190 23,207 Q33,221 18,238 Q5,254 0,252" fill="#ffaa00" opacity="0.45"/>
    <path d="M0,315 Q20,305 33,322 Q46,340 30,355 Q14,368 0,360" fill="#ff5500" opacity="0.60" filter="url(#glow)"/>
    <path d="M0,315 Q16,308 27,322 Q38,336 24,350 Q10,362 0,360" fill="#ffbb00" opacity="0.38"/>

    <!-- fendas de magma — parede direita -->
    <path d="M420,158 Q403,150 390,168 Q377,187 394,204 Q410,220 420,214" fill="#ff4400" opacity="0.65" filter="url(#glow)"/>
    <path d="M420,158 Q406,153 394,169 Q382,185 397,202 Q412,217 420,214" fill="#ffaa00" opacity="0.45"/>
    <path d="M420,285 Q400,277 386,295 Q373,314 390,330 Q406,345 420,338" fill="#ff5500" opacity="0.60" filter="url(#glow)"/>

    <!-- tubulação esquerda -->
    <rect x="10" y="135" width="13" height="195" rx="4" fill="#231205" stroke="#4a2808" stroke-width="1"/>
    <rect x="10" y="182" width="13" height="16"  rx="2" fill="#3a1e08" stroke="#5a3010" stroke-width="1"/>
    <rect x="10" y="264" width="13" height="16"  rx="2" fill="#3a1e08" stroke="#5a3010" stroke-width="1"/>
    <circle cx="16" cy="190" r="3.5" fill="#1a0c04" stroke="#6a3a18" stroke-width="1"/>
    <circle cx="16" cy="272" r="3.5" fill="#1a0c04" stroke="#6a3a18" stroke-width="1"/>
    <!-- brilho de vapor -->
    <circle cx="16" cy="135" r="8" fill="#ff6600" opacity="0.35" filter="url(#glowSoft)"/>
    <circle cx="16" cy="135" r="4" fill="#ffcc00" opacity="0.25"/>

    <!-- tubulação direita -->
    <rect x="397" y="148" width="13" height="178" rx="4" fill="#231205" stroke="#4a2808" stroke-width="1"/>
    <rect x="397" y="194" width="13" height="16"  rx="2" fill="#3a1e08" stroke="#5a3010" stroke-width="1"/>
    <rect x="397" y="278" width="13" height="16"  rx="2" fill="#3a1e08" stroke="#5a3010" stroke-width="1"/>
    <circle cx="403" cy="202" r="3.5" fill="#1a0c04" stroke="#6a3a18" stroke-width="1"/>
    <circle cx="403" cy="286" r="3.5" fill="#1a0c04" stroke="#6a3a18" stroke-width="1"/>
    <circle cx="403" cy="148" r="8" fill="#ff6600" opacity="0.32" filter="url(#glowSoft)"/>

    <!-- engrenagens decorativas na parede -->
    <g opacity="0.18" transform="translate(30,420) rotate(15)">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#c08030" stroke-width="3"/>
      <circle cx="0" cy="0" r="6"  fill="#c08030"/>
      <line x1="0" y1="-16" x2="0"  y2="-22" stroke="#c08030" stroke-width="3"/>
      <line x1="0" y1="16"  x2="0"  y2="22"  stroke="#c08030" stroke-width="3"/>
      <line x1="-16" y1="0" x2="-22" y2="0"  stroke="#c08030" stroke-width="3"/>
      <line x1="16"  y1="0" x2="22"  y2="0"  stroke="#c08030" stroke-width="3"/>
    </g>
    <g opacity="0.14" transform="translate(390,380) rotate(-20)">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#c08030" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="5"  fill="#c08030"/>
      <line x1="0" y1="-14" x2="0"  y2="-20" stroke="#c08030" stroke-width="2.5"/>
      <line x1="0" y1="14"  x2="0"  y2="20"  stroke="#c08030" stroke-width="2.5"/>
      <line x1="-14" y1="0" x2="-20" y2="0"  stroke="#c08030" stroke-width="2.5"/>
      <line x1="14"  y1="0" x2="20"  y2="0"  stroke="#c08030" stroke-width="2.5"/>
    </g>

    <!-- piso vulcânico -->
    <path d="M0,490 Q55,470 118,486 Q182,502 245,478 Q305,456 368,472 Q395,480 420,462 L420,600 L0,600 Z" fill="#1c0d05"/>
    <path d="M0,512 Q70,494 142,510 Q215,526 288,505 Q348,488 420,504 L420,600 L0,600 Z" fill="#130906"/>
    <path d="M0,535 Q80,520 160,538 Q240,556 320,535 Q375,520 420,532 L420,600 L0,600 Z" fill="#0d0705"/>

    <!-- fendas de magma no chão -->
    <path d="M55,512 Q88,500 130,514 Q155,522 148,530 Q138,540 105,534 Q68,528 55,512Z" fill="#ff4400" opacity="0.55" filter="url(#glow)"/>
    <path d="M68,512 Q95,504 128,515 Q148,521 142,528 Q134,536 108,531 Q76,525 68,512Z" fill="#ffaa00" opacity="0.4"/>
    <path d="M255,498 Q295,485 338,502 Q360,512 354,522 Q342,534 305,526 Q265,518 255,498Z" fill="#ff5500" opacity="0.50" filter="url(#glow)"/>
    <path d="M268,499 Q302,488 335,503 Q354,511 349,520 Q339,530 308,524 Q272,516 268,499Z" fill="#ffbb00" opacity="0.38"/>
    <!-- fenda pequena central -->
    <path d="M178,530 Q200,522 222,532 Q230,538 224,544 Q210,550 196,546 Q180,540 178,530Z" fill="#ff4400" opacity="0.45" filter="url(#glow)"/>

    <!-- brilho ambiente do magma embaixo -->
    <ellipse cx="210" cy="600" rx="200" ry="60" fill="#ff4400" opacity="0.12" filter="url(#glowSoft)"/>
    <ellipse cx="210" cy="580" rx="140" ry="35" fill="#ff6600" opacity="0.08"/>
  </svg>

  <!-- BOTÃO VOLTAR -->
  <a id="btn-voltar" href="../">← Portfólio</a>

  <!-- OVERLAY MORTE -->
  <div id="overlay-morte"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-row">
      <span id="hud-label">⚡ Fome</span>
      <div id="barra-wrap">
        <div id="barra-fome"></div>
      </div>
    </div>
    <div id="status-txt">● NORMAL</div>
  </div>

  <!-- SOMBRA -->
  <div id="sombra"></div>

  <!-- CRIATURA -->
  <div id="criatura-wrap">
    <img id="b" src="criatura.png" alt="bichinho">
  </div>

  <!-- BANDEJA -->
  <div id="bandeja">
    <div class="comida-slot" id="slot-comida">
      <img src="comida.png" alt="comida">
    </div>
  </div>

  <!-- BOTÃO REINICIAR -->
  <button id="btn-reiniciar">🔄 Reiniciar</button>

</div>

<script src="script.js"></script>
</body>
</html>
